name: Deploy Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  deployment:
  workflow_dispatch:

concurrency:
  group: deploy-checks-${{ github.event.deployment.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  DISABLE_BACKGROUND_TASKS: "true"
  ENABLE_FULFILLMENT: "false"
  LANGFUSE_ENABLED: "false"
  SUPABASE_URL: "http://localhost:54321"
  SUPABASE_ANON_KEY: "ci-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
  AWS_ACCESS_KEY_ID: "ci-access-key"
  AWS_SECRET_ACCESS_KEY: "ci-secret-key"
  AWS_S3_BUCKET: "leadpoet-ci"
  AWS_S3_REGION: "us-east-2"
  OPENROUTER_API_KEY: "ci-openrouter-key"
  OPENROUTER_KEY: "ci-openrouter-key"
  SCRAPINGDOG_API_KEY: "ci-scrapingdog-key"
  ZEROBOUNCE_API_KEY: "ci-zerobounce-key"
  BITTENSOR_NETWORK: "test"
  BITTENSOR_NETUID: "71"
  GATEWAY_PRIVATE_KEY_PASSWORD: "ci-gateway-key-password"

jobs:
  test:
    name: Unit and Workflow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # Every production runtime (gateway host, validator host, containers)
        # now runs Python 3.11; the sealed validator enclave stays on its
        # measured 3.7 image and is guarded by the AST annotation test.
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            setup.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile Python packages
        run: |
          python -m compileall -q \
            Leadpoet \
            gateway \
            leadpoet_audit \
            leadpoet_canonical \
            leadpoet_verifier \
            miner_models \
            qualification \
            research_lab \
            validator_models

      - name: Ensure PostgreSQL server binaries (migration integration test)
        run: |
          if ! ls /usr/lib/postgresql/*/bin/initdb >/dev/null 2>&1 \
             && ! command -v initdb >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi
          pgbin="$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | sort -r | head -1)"
          [ -n "$pgbin" ] && echo "$pgbin" >> "$GITHUB_PATH" || true
          "${pgbin:+$pgbin/}initdb" --version || true

      - name: Run pytest suite
        run: |
          python -m pytest -q \
            --cov=Leadpoet \
            --cov=gateway \
            --cov=leadpoet_canonical \
            --cov=leadpoet_verifier \
            --cov=qualification \
            --cov=research_lab \
            --cov=validator_models \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker Build Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: false
          tags: leadpoet-gateway:${{ github.sha }}
          build-args: |
            BUILD_ID=${{ github.run_id }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF_NAME=${{ github.ref_name }}

      - name: Build validator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: validator_models/containerizing/Dockerfile
          push: false
          tags: leadpoet-validator:${{ github.sha }}
