# Golden eval ICPs — small starter set covering 3 intent classes.
# Each ICP includes expected_one_of (acceptable winners) and must_not_return.

- icp_id: funding_ai_2026
  prompt: "Major AI lab that raised significant funding in 2025 or 2026"
  industry: Artificial Intelligence
  sub_industry: AI Infrastructure
  geography: United States
  country: US
  employee_count: 201-5000
  company_stage: Late Stage
  product_service: AI compute and developer tooling
  intent_signals:
    - "Raised significant funding in 2025 or 2026"
  expected_one_of:
    - {name: Anthropic,    domain: anthropic.com}
    - {name: OpenAI,       domain: openai.com}
    - {name: xAI,          domain: x.ai}
    - {name: Mistral AI,   domain: mistral.ai}
    - {name: Cohere,       domain: cohere.com}
  must_not_return:
    - {name: Stripe,       reason: "not an AI lab"}

- icp_id: launch_ai_2026
  prompt: "AI company that launched a new model or major product in 2026"
  industry: Artificial Intelligence
  sub_industry: AI Infrastructure
  geography: United States
  country: US
  employee_count: 201-5000
  company_stage: Late Stage
  product_service: AI products
  intent_signals:
    - "Launched a new AI model or product in 2026"
  expected_one_of:
    - {name: Anthropic,    domain: anthropic.com}
    - {name: OpenAI,       domain: openai.com}
    - {name: Google DeepMind, domain: deepmind.google}
  must_not_return:
    - {name: Twitter,      reason: "not a model launcher"}

- icp_id: leadership_change_tech
  prompt: "Major tech company that hired a new C-level executive in 2025 or 2026"
  industry: Technology
  sub_industry: Software
  geography: United States
  country: US
  employee_count: 1001-50000
  company_stage: Public
  product_service: Enterprise software
  intent_signals:
    - "Appointed a new C-level executive in 2024 or 2025"
  expected_one_of:
    - {name: OpenAI,       domain: openai.com}
    - {name: Microsoft,    domain: microsoft.com}
    - {name: Salesforce,   domain: salesforce.com}
    - {name: Slack,        domain: slack.com}
    - {name: ServiceNow,   domain: servicenow.com}
    - {name: Oracle,       domain: oracle.com}
    - {name: SAP,          domain: sap.com}
    - {name: IBM,          domain: ibm.com}
    - {name: Workday,      domain: workday.com}
    - {name: Adobe,        domain: adobe.com}
  must_not_return:
    - {name: SmallCorp,    reason: "placeholder"}
