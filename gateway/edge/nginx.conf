# Leadpoet gateway edge template.
#
# Deploy on the parent EC2 only after operator review. This config is
# intentionally versioned but not activated by the Python gateway restart.

limit_req_zone $binary_remote_addr zone=leadpoet_perip_req:10m rate=15r/s;
limit_conn_zone $binary_remote_addr zone=leadpoet_perip_conn:10m;

upstream leadpoet_gateway_app {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 8000;
    server_name _;

    client_max_body_size 10m;
    client_body_timeout 10s;
    keepalive_timeout 5s;
    send_timeout 15s;

    limit_conn leadpoet_perip_conn 40;
    limit_req zone=leadpoet_perip_req burst=40 nodelay;

    access_log /var/log/nginx/leadpoet_gateway_access.log;
    error_log /var/log/nginx/leadpoet_gateway_error.log warn;

    location = /health { proxy_pass http://leadpoet_gateway_app; }
    location = / { proxy_pass http://leadpoet_gateway_app; }
    location = /build-info { proxy_pass http://leadpoet_gateway_app; }
    location = /metrics { allow 127.0.0.1; deny all; proxy_pass http://leadpoet_gateway_app; }

    location /attest { proxy_pass http://leadpoet_gateway_app; }
    location /attestation/ { proxy_pass http://leadpoet_gateway_app; }
    location /weights/ { proxy_pass http://leadpoet_gateway_app; }
    location /fulfillment/ { proxy_pass http://leadpoet_gateway_app; }
    location /qualification/ { proxy_pass http://leadpoet_gateway_app; }
    location /research-lab/ { proxy_pass http://leadpoet_gateway_app; }
    location /epoch/ { proxy_pass http://leadpoet_gateway_app; }
    location /validate { proxy_pass http://leadpoet_gateway_app; }
    location /manifest { proxy_pass http://leadpoet_gateway_app; }

    location / {
        return 403;
    }
}
